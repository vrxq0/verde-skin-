<!-- product.html -->
<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERDE SKIN | تفاصيل المنتج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-detail-page {
            padding: 8rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }
        
        .product-gallery {
            position: relative;
        }
        
        .main-image {
            width: 100%;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }
        
        .main-image:hover {
            transform: scale(1.02);
        }
        
        .thumbnail-grid {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            object-fit: cover;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            opacity: 0.7;
        }
        
        .thumbnail:hover,
        .thumbnail.active {
            border-color: var(--deep-green);
            opacity: 1;
            transform: scale(1.05);
        }
        
        .product-info-detail {
            padding: 1rem;
        }
        
        .product-info-detail h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .product-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .product-price-large {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--deep-green);
        }
        
        .product-price-large::after {
            content: ' DA';
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-light);
        }
        
        .product-rating {
            color: #f1c40f;
            font-size: 1.2rem;
        }
        
        .product-rating span {
            color: var(--text-light);
            margin-left: 0.5rem;
            font-size: 1rem;
        }
        
        .product-description {
            margin: 2rem 0;
            line-height: 1.8;
            color: var(--text-light);
            font-size: 1.1rem;
        }
        
        .product-ingredients {
            background: var(--soft-cream);
            padding: 1.5rem;
            border-radius: var(--border-radius-md);
            margin: 2rem 0;
        }
        
        .product-ingredients h3 {
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }
        
        .add-to-cart-large {
            background: var(--deep-green);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-md);
        }
        
        .add-to-cart-large:hover {
            background: var(--gold-green);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        @media (max-width: 768px) {
            .product-detail-page {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="luxury-header">
        <div class="header-container">
            <div class="logo">VERDE<span>SKIN</span></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">الرئيسية</a>
                <a href="index.html#products" class="nav-link">المجموعة</a>
                <a href="index.html#about" class="nav-link">القصة</a>
            </nav>
            <div class="header-actions">
                <button class="cart-button" id="cartToggle" aria-label="السلة">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count" id="cartCount">0</span>
        </button>
            </div>
        </div>
    </header>

    <section class="product-detail-page">
        <div class="product-gallery">
            <img id="mainImage" class="main-image" src="" alt="">
            <div class="thumbnail-grid" id="thumbnailGrid"></div>
        </div>
        <div class="product-info-detail">
            <h1 id="productName"></h1>
            <div class="product-meta">
                <span class="product-price-large" id="productPrice"></span>
                <div class="product-rating" id="productRating"></div>
            </div>
            <p class="product-description" id="productDesc"></p>
            <div class="product-ingredients" id="productIngredients"></div>
            <button class="add-to-cart-large" id="addToCartBtn">
        <i class="fas fa-shopping-bag"></i>
        أضف إلى السلة
      </button>
        </div>
    </section>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>سلة التسوق</h3>
            <button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي</span>
                <span id="cartTotal">0 DA</span>
            </div>
            <button class="btn btn-primary checkout-btn" id="checkoutBtn">إتمام الشراء</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="toast-notification" id="toast"></div>

    <script type="module" src="products.js"></script>
    <script type="module" src="cart.js"></script>
    <script type="module" src="productPage.js"></script>
</body>

</html>
